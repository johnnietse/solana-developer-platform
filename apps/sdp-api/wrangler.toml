name = "sdp-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "00000000000000000000000000000000"
localConnectionString = "postgresql://postgres:sdp@127.0.0.1:5433/sdp"

# KV Namespaces
[[kv_namespaces]]
binding = "SDP_API_KEYS"
id = "local-api-keys"

[[kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "local-rate-limits"

[[kv_namespaces]]
binding = "SDP_CACHE"
id = "local-cache"

[[kv_namespaces]]
binding = "SDP_SESSIONS"
id = "local-sessions"

[triggers]
# Run every minute to reconcile pending/processing transfer statuses
  crons = [
    "* * * * *",         # Transfer reconciliation (existing)
    "*/5 * * * *",       # Analytics ingestion (every 5 min)
    "0 2 * * *",         # Wallet label enrichment (daily)
    "0 3 * * *",         # Token discovery (daily at 3am)
    "0 4 * * *",         # User token sync (daily at 4am)
  ]

[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
SDP_RUNTIME = "cloudflare"
EMAIL_FROM = "noreply@mail.solana.org"
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
SOLANA_RPC_DEFAULT_PROVIDER = "default"
SOLANA_RPC_TRITON_URL = "https://your-triton-endpoint.devnet.rpcpool.com/{API_KEY}"
# Local dev defaults. Can be overridden by apps/sdp-api/.dev.vars.
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://your-kora-devnet-instance.us-central1.run.app"
ANALYTICS_ENABLED = "true"
# Option B (free dev/demo): real mainnet holders flow in locally for $0.
# Analytics uses ANALYTICS_RPC_URL (mainnet) while the rest of dev stays devnet.
ANALYTICS_MINTS = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPXg4gQzNBP"  # PYUSD (mainnet, smaller than USDC)
ANALYTICS_RPC_URL = "https://api.mainnet.solana.com"

# Dev environment
[env.dev]
name = "sdp-api-dev"
compatibility_flags = [
  "nodejs_compat",
  "no_handle_cross_request_promise_resolution",
]

[[env.dev.hyperdrive]]
binding = "HYPERDRIVE"
id = "your_dev_hyperdrive_id"

[[env.dev.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "your_dev_api_keys_kv_id"

[[env.dev.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "your_dev_rate_limits_kv_id"

[[env.dev.kv_namespaces]]
binding = "SDP_CACHE"
id = "your_dev_cache_kv_id"

[[env.dev.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "your_dev_sessions_kv_id"

[env.dev.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
SDP_RUNTIME = "cloudflare"
EMAIL_FROM = "noreply@mail.solana.org"
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
SOLANA_RPC_DEFAULT_PROVIDER = "helius"
SOLANA_RPC_ALCHEMY_URL = "https://solana-devnet.g.alchemy.com/v2/{API_KEY}"
SOLANA_RPC_TRITON_URL = "https://your-triton-endpoint.devnet.rpcpool.com/{API_KEY}"
SOLANA_RPC_HELIUS_URL = "https://devnet.helius-rpc.com/?api-key={API_KEY}"
SOLANA_RPC_QUICKNODE_URL = "https://your-quicknode-endpoint.solana-devnet.quiknode.pro/{API_KEY}"
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://your-kora-devnet-instance.us-central1.run.app"
ANALYTICS_ENABLED = "true"
# Option B (free dev/demo): real mainnet holders flow in locally for $0.
# Analytics uses ANALYTICS_RPC_URL (mainnet) while the rest of dev stays devnet.
ANALYTICS_MINTS = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPXg4gQzNBP"  # PYUSD (mainnet, smaller than USDC)
ANALYTICS_RPC_URL = "https://api.mainnet.solana.com"

# Production environment
[env.production]
name = "sdp-api-production"
compatibility_flags = [
  "nodejs_compat",
  "no_handle_cross_request_promise_resolution",
]

[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "your_production_hyperdrive_id"

[[env.production.kv_namespaces]]
binding = "SDP_API_KEYS"
id = "your_production_api_keys_kv_id"

[[env.production.kv_namespaces]]
binding = "SDP_RATE_LIMITS"
id = "your_production_rate_limits_kv_id"

[[env.production.kv_namespaces]]
binding = "SDP_CACHE"
id = "your_production_cache_kv_id"

[[env.production.kv_namespaces]]
binding = "SDP_SESSIONS"
id = "your_production_sessions_kv_id"

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
SDP_RUNTIME = "cloudflare"
EMAIL_FROM = "noreply@mail.solana.org"
SOLANA_NETWORK = "devnet"
SOLANA_RPC_URL = "https://api.devnet.solana.com"
SOLANA_RPC_DEFAULT_PROVIDER = "helius"
SOLANA_RPC_ALCHEMY_URL = "https://solana-devnet.g.alchemy.com/v2/{API_KEY}"
SOLANA_RPC_TRITON_URL = "https://your-triton-endpoint.devnet.rpcpool.com/{API_KEY}"
SOLANA_RPC_HELIUS_URL = "https://devnet.helius-rpc.com/?api-key={API_KEY}"
SOLANA_RPC_QUICKNODE_URL = "https://your-quicknode-endpoint.solana-devnet.quiknode.pro/{API_KEY}"
FEE_PAYMENT_PROVIDER = "kora"
KORA_RPC_URL = "https://your-kora-devnet-instance.us-central1.run.app"
ANALYTICS_ENABLED = "true"

# Production analytics use mints and RPC set via Cloudflare secrets.
# Set ANALYTICS_MINTS (comma-separated) and ANALYTICS_RPC_URL before deploy:
#   wrangler secret put ANALYTICS_MINTS
#   wrangler secret put ANALYTICS_RPC_URL
# Recommended: USDC (EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v) + dedicated paid RPC.
